<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puissance 4 IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; padding: 10px; }
        .game-container { display: inline-block; background: #34495e; padding: 20px; border-radius: 15px; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; width: 320px; }
        @media (min-width: 600px) { .grid { width: 500px; gap: 12px; } }
        
        .cell { aspect-ratio: 1/1; background: #ecf0f1; border-radius: 50%; cursor: pointer; border: 2px solid #2c3e50; }
        .cell.player { background: #e74c3c; } /* Rouge */
        .cell.ai { background: #f1c40f; }     /* Jaune */
        
        .controls { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { padding: 15px 25px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; background: #3498db; color: white; font-weight: bold; }
        button:hover { background: #2980b9; }
        #status { margin: 15px; font-weight: bold; color: #ecf0f1; height: 24px; }
    </style>
</head>
<body>
    <h1>Puissance 4 Intelligent</h1>
    <div id="status">Chargement...</div>
    <div class="game-container">
        <div id="board" class="grid"></div>
    </div>
    <div class="controls">
        <button id="btn-reset">Nouvelle Partie</button>
        <button id="btn-train">Entraînement Auto</button>
        <button id="btn-save" style="background:#27ae60">Sauvegarder</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
