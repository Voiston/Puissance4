<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puissance 4 IA - Master Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .stats-bar { background: #34495e; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-around; font-size: 0.9em; border: 1px solid #465c71; }
        .stat-value { color: #3498db; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; background: #34495e; padding: 15px; border-radius: 15px; border: 4px solid #2c3e50; }
        .cell { aspect-ratio: 1/1; background: #ecf0f1; border-radius: 50%; cursor: pointer; border: 2px solid #2c3e50; transition: 0.2s; }
        .cell:hover { background: #bdc3c7; }
        .cell.player { background: #e74c3c; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .cell.ai { background: #f1c40f; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .controls { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { padding: 12px 20px; font-size: 14px; border: none; border-radius: 8px; cursor: pointer; background: #3498db; color: white; font-weight: bold; transition: 0.3s; }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        #status { margin: 15px; font-weight: bold; color: #ecf0f1; height: 24px; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Puissance 4 IA</h1>
        
        <div class="stats-bar">
            <div>Matches : <span id="total-games" class="stat-value">0</span></div>
            <div>Winrate IA : <span id="ai-winrate" class="stat-value">0</span>%</div>
            <div>Statut : <span id="ia-status" class="stat-value">Chargement...</span></div>
        </div>

        <div id="status">Prêt à jouer</div>

        <div id="board" class="grid"></div>

        <div class="controls">
            <button id="btn-reset">Nouvelle Partie</button>
            <button id="btn-train" style="background:#8e44ad">Rafale (100 matches)</button>
            <button id="btn-save" style="background:#27ae60">Sauvegarde Manuelle</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
