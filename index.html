<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>IA Puissance 4 Apprenante</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .grid { display: grid; grid-template-columns: repeat(7, 50px); gap: 5px; background: #007bff; padding: 10px; border-radius: 10px; }
        .cell { width: 50px; height: 50px; background: white; border-radius: 50%; cursor: pointer; }
        .cell.player { background: red; }
        .cell.ai { background: yellow; }
    </style>
</head>
<body>
    <h1>Puissance 4 ML</h1>
    <div id="board" class="grid"></div>
    <p id="status">L'IA apprend à chaque coup...</p>

<div class="controls">
    <button onclick="resetGame()">Nouvelle Partie</button>
    <button onclick="selfPlay(50)">Entraînement Auto (50)</button>
    <hr>
    <button onclick="saveAI()">Sauvegarder l'IA</button>
    <button onclick="loadAI()">Charger l'IA sauvegardée</button>
</div>


    <script src="game.js"></script>
</body>
</html>
