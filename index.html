<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puissance 4 Master IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        :root { --blue: #2c3e50; --yellow: #f1c40f; --red: #e74c3c; --white: #ecf0f1; }
        body { font-family: sans-serif; background: #34495e; color: white; text-align: center; margin: 0; padding: 20px; }
        
        /* Grille Responsive */
        .game-container { display: inline-block; background: var(--blue); padding: 15px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; max-width: 90vw; }
        
        /* Cellules plus grandes pour le tactile */
        .cell { width: 45px; height: 45px; background: var(--white); border-radius: 50%; cursor: pointer; transition: 0.3s; }
        @media (min-width: 600px) { .cell { width: 70px; height: 70px; } }
        
        .cell.player { background: var(--red); box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .cell.ai { background: var(--yellow); box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        
        .controls { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #2980b9; color: white; }
        button:active { transform: scale(0.95); }
        #status { font-style: italic; margin: 15px; min-height: 1.2em; color: #bdc3c7; }
    </style>
</head>
<body>

    <h1>IA Apprenante</h1>
    <div id="status">Chargement de l'intelligence...</div>

    <div class="game-container">
        <div id="board" class="grid"></div>
    </div>

    <div class="controls">
        <button onclick="resetGame()">Nouvelle Partie</button>
        <button onclick="startSelfPlay()">Entraînement Auto (x50)</button>
        <button onclick="saveAI()" style="background:#27ae60">Sauvegarder</button>
        <button onclick="loadAI()" style="background:#8e44ad">Charger</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
